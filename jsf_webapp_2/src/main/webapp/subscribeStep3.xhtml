<?xml version='1.0' encoding='UTF-8' ?>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Super Mario</title>
</h:head>

<h:body style="padding:10px 200px;">

    <ui:include src="header.xhtml" />

    <h2>Абониране - стъпка 3</h2>

    <h:form>
        <h:panelGrid columns="2">

            Категория:
            <h:outputText value="#{subscribe.selectedCategory}" />

            Подкатегория:
            <h:outputText value="#{subscribe.selectedSubCategory}" />

            Имейл:
            <h:inputText required="true"
                         value="#{subscribe.email}" />

            <h:commandButton value="Назад"
                             action="#{subscribe.goToStep2()}" />

            <h:commandButton value="Абонирай ме"
                             action="#{subscribe.goToFinish()}" />

        </h:panelGrid>
    </h:form>

</h:body>
</html>
