<?xml version='1.0' encoding='UTF-8' ?>

<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Super Mario</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 8px;
        }

        input {
            padding: 5px 10px;
        }
    </style>
</h:head>

<h:body style="padding:10px 200px;">

    <ui:include src="header.xhtml"/>

    <h2>Добавени съобщения</h2>

    <h:graphicImage
            value="resources/images/paratroopa.png"
            style="height:80px; padding-right:10px; padding-bottom:10px; float:right;"/>

    <h:form>
        <h:panelGrid columns="2" cellpadding="5">

            Филтрирай по
            <h:selectOneRadio value="#{messagesFilter.filterBy}">
                <f:selectItems value="#{messagesFilter.filterByOptions}"/>
            </h:selectOneRadio>

            Филтриращ текст
            <h:inputText required="true" value="#{messagesFilter.filterText}"/>

            <h:panelGroup/>
            <h:commandButton value="Филтрирай" action="#{messagesFilter.filter()}"/>

        </h:panelGrid>
    </h:form>

    <br/>
    <hr/>
    <br/>

    <h:dataTable value="#{messagesFilter.filteredMessages}" var="msg" border="1">

        <h:column>
            <f:facet name="header">ID</f:facet>
            #{msg.id}
        </h:column>

        <h:column>
            <f:facet name="header">Име</f:facet>
            #{msg.senderName}
        </h:column>

        <h:column>
            <f:facet name="header">Имейл</f:facet>
            #{msg.email}
        </h:column>

        <h:column>
            <f:facet name="header">Съобщение</f:facet>
            #{msg.message}
        </h:column>

        <h:column>
            <f:facet name="header">Изтриване</f:facet>

            <h:form>
                <h:commandButton value="Изтрий"
                                 action="#{messagesFilter.deleteMessage(msg.id)}"/>
            </h:form>
        </h:column>

    </h:dataTable>

</h:body>
</html>
