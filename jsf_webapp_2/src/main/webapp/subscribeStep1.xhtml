<?xml version='1.0' encoding='UTF-8' ?>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

<h:head>
    <title>Super Mario</title>
</h:head>

<h:body style="padding:10px 200px;">

    <ui:include src="header.xhtml" />

    <h2>Абониране - стъпка 1</h2>

    <f:metadata>
        <f:viewAction action="#{subscribe.start()}" />
    </f:metadata>

    <h:form>
        <h:panelGrid columns="2">

            Изберете категория:
            <h:selectOneMenu value="#{subscribe.selectedCategory}">
                <f:selectItems value="#{subscribe.subscribtionCategories}" />
            </h:selectOneMenu>

            <h:outputText />
            <h:commandButton value="Напред"
                             action="#{subscribe.goToStep2()}" />

        </h:panelGrid>
    </h:form>

</h:body>
</html>
